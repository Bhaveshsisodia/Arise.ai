name: Deploy Container App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY_NAME: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
  IMAGE_NAME: arise-chatbot
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  CONTAINER_APP_NAME: ${{ secrets.AZURE_CONTAINER_APP_NAME }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name "$env:REGISTRY_NAME"
        shell: pwsh

      - name: Build and push image
        run: |
          $imageTag = "${env:REGISTRY_NAME}.azurecr.io/${env:IMAGE_NAME}:${env:GITHUB_SHA}"
          docker build -t $imageTag .
          docker push $imageTag
          echo "IMAGE_TAG=$imageTag" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Deploy revision
        run: |
          az containerapp update `
            --name "$env:CONTAINER_APP_NAME" `
            --resource-group "$env:RESOURCE_GROUP" `
            --image "$env:IMAGE_TAG"
        shell: pwsh
