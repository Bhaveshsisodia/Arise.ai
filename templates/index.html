<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arise Document Chat</title>
    <link rel="stylesheet" href="/static/css/chat.css" />
</head>
<body>
    <div class="page">
        <header class="hero">
            <div class="hero-copy">
                <p class="eyebrow">Grounded AI Assistant</p>
                <h1>Arise Document Chat</h1>
                <p class="hero-description">
                    Ask questions about your regulatory documents and get precise, source-backed answers in a beautiful chat interface.
                </p>
            </div>
            <div class="hero-badge">
                <span>RAG + Streaming</span>
                <span>Sources Included</span>
                <span>Production UI</span>
            </div>
        </header>

        <main class="chat-card">
            <div id="messages" class="messages"></div>
            <div class="footer">
                <input id="question" type="text" placeholder="Ask your question..." autocomplete="off" />
                <button id="send">Send</button>
            </div>
        </main>
    </div>
    <script src="/static/js/chat.js"></script>
</body>
</html>
