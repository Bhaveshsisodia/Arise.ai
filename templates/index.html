<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arise Document Chat</title>
    <link rel="stylesheet" href="/static/css/chat.css" />
</head>
<body>
    <div class="page">
        <h1>Arise Document Chat</h1>
        <p>Ask questions about the document and get grounded answers with retrieval sources.</p>
        <div class="chat-box">
            <div id="messages" class="messages"></div>
            <div class="footer">
                <input id="question" type="text" placeholder="Ask your question..." autocomplete="off" />
                <button id="send">Send</button>
            </div>
        </div>
    </div>
    <script src="/static/js/chat.js"></script>
</body>
</html>
